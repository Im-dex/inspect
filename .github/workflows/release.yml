name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: inspect

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p inspect-cli

      - name: Package Linux release asset
        if: runner.os == 'Linux'
        shell: bash
        env:
          ASSET_NAME: ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          dist="${RUNNER_TEMP}/dist"
          mkdir -p "${dist}"

          cp "target/${TARGET}/release/${BIN_NAME}" "${dist}/${BIN_NAME}"
          cp README.md LICENSE.md "${dist}/"

          tar -czf "${ASSET_NAME}" -C "${dist}" .
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"

      - name: Package Windows release asset
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ASSET_NAME: ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip
          EXE_SUFFIX: ${{ matrix.exe_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = "Stop"

          $dist = Join-Path $env:RUNNER_TEMP "dist"
          New-Item -ItemType Directory -Force $dist | Out-Null

          $source = Join-Path "target" (Join-Path $env:TARGET (Join-Path "release" "$env:BIN_NAME$env:EXE_SUFFIX"))
          $destination = Join-Path $dist "$env:BIN_NAME$env:EXE_SUFFIX"
          Copy-Item $source $destination
          Copy-Item "README.md" $dist
          Copy-Item "LICENSE.md" $dist

          Compress-Archive -Path (Join-Path $dist "*") -DestinationPath $env:ASSET_NAME -Force
          $digest = (Get-FileHash -Algorithm SHA256 $env:ASSET_NAME).Hash.ToLowerInvariant()
          "$digest  $env:ASSET_NAME" | Set-Content -Encoding ascii "$env:ASSET_NAME.sha256"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
            ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip
            ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-${{ github.ref_name }}-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/* --verify-tag --generate-notes
